<text x="384" y="880" text-anchor="end" class="fs" font-size="22" font-weight="500" fill="#1A1A1A" letter-spacing="-0.03em" font-stretch="condensed">12.4 T</text>
<text x="384" y="898" text-anchor="end" class="fs" font-size="9" font-weight="400" fill="#666">+ 5% Volumen</text>

