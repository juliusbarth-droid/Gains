<text x="380" y="352" text-anchor="end" class="fs" font-size="15" font-weight="500" fill="#D4E85C" font-stretch="condensed">4 × 8</text>
<text x="380" y="367" text-anchor="end" class="fs" font-size="9" font-weight="400" fill="#999">85 kg Ziel</text>

<line x1="60" y1="380" x2="380" y2="380" stroke="#2a2a2a" stroke-width="0.5"/>

<!-- Row 2 -->
<text x="60" y="400" class="fs" font-size="13" font-weight="500" fill="#F4F2EC">Incline DB Press</text>
<text x="60" y="415" class="fs" font-size="9" font-weight="400" fill="#999" letter-spacing="1">LETZTES MAL · 28 KG</text>
<text x="380" y="402" text-anchor="end" class="fs" font-size="15" font-weight="500" fill="#F4F2EC" font-stretch="condensed">3 × 10</text>
<text x="380" y="417" text-anchor="end" class="fs" font-size="9" font-weight="400" fill="#999">28 kg halten</text>

<line x1="60" y1="430" x2="380" y2="430" stroke="#2a2a2a" stroke-width="0.5"/>

