<text x="60" y="450" class="fs" font-size="13" font-weight="500" fill="#F4F2EC">Dips</text>
<text x="60" y="465" class="fs" font-size="9" font-weight="400" fill="#999" letter-spacing="1">LETZTES MAL · BW + 15 KG</text>
<text x="380" y="452" text-anchor="end" class="fs" font-size="15" font-weight="500" fill="#F4F2EC" font-stretch="condensed">3 × 12</text>
<text x="380" y="467" text-anchor="end" class="fs" font-size="9" font-weight="400" fill="#999">+ 15 kg</text>

<line x1="60" y1="478" x2="380" y2="478" stroke="#2a2a2a" stroke-width="0.5"/>

<!-- Row 4 -->
<text x="60" y="498" class="fs" font-size="13" font-weight="500" fill="#F4F2EC">Triceps Rope</text>
<text x="60" y="513" class="fs" font-size="9" font-weight="400" fill="#999" letter-spacing="1">LETZTES MAL · 30 KG</text>
<text x="380" y="500" text-anchor="end" class="fs" font-size="15" font-weight="500" fill="#F4F2EC" font-stretch="condensed">3 × 12</text>
<text x="380" y="515" text-anchor="end" class="fs" font-size="9" font-weight="400" fill="#999">30 kg halten</text>

<!-- START CTA (full-width lime) -->
<rect x="60" y="528" width="320" height="0" fill="none"/>
<!-- Actually put button separate, big -->
</g>

