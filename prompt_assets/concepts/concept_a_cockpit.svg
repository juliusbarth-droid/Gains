<text x="56" y="880" class="fs" font-size="22" font-weight="500" fill="#666" letter-spacing="-0.03em" font-stretch="condensed">11.8 T</text>
<text x="56" y="898" class="fs" font-size="9" font-weight="400" fill="#999">12. März · 44 Min</text>

