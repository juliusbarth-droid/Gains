<rect x="286" y="692" width="114" height="86" rx="14" fill="#F4F2EC"/>
<text x="300" y="712" class="fs" font-size="8" font-weight="500" fill="#999" letter-spacing="2">MUSKELN</text>
<text x="300" y="744" class="fs" font-size="26" font-weight="500" fill="#1A1A1A" letter-spacing="-0.03em" font-stretch="condensed">FRISCH</text>
