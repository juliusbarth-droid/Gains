<!-- HERO WORKOUT CARD (Cockpit) -->
<!-- ============================================= -->
<rect x="40" y="220" width="360" height="320" rx="22" fill="#1A1A1A"/>

<!-- Meta slash row -->
<text x="60" y="248" class="fs" font-size="9" font-weight="500" fill="#D4E85C" letter-spacing="3">HEUTE</text>
<text x="100" y="248" class="fs" font-size="9" font-weight="500" fill="#666" letter-spacing="1">/</text>
<text x="108" y="248" class="fs" font-size="9" font-weight="500" fill="#999" letter-spacing="3">BRUST · TRIZEPS</text>
<text x="220" y="248" class="fs" font-size="9" font-weight="500" fill="#666" letter-spacing="1">/</text>
<text x="228" y="248" class="fs" font-size="9" font-weight="500" fill="#999" letter-spacing="3">45 MIN</text>
<text x="266" y="248" class="fs" font-size="9" font-weight="500" fill="#666" letter-spacing="1">/</text>
<text x="274" y="248" class="fs" font-size="9" font-weight="500" fill="#999" letter-spacing="3">12.4 T</text>

