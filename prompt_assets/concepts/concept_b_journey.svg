<text x="312" y="840" text-anchor="middle" class="fs" font-size="12" font-weight="500" fill="#1A1A1A" letter-spacing="2">START</text>
<text x="356" y="842" class="fs" font-size="14" font-weight="500" fill="#1A1A1A">→</text>

<!-- Bottom tab bar -->
<line x1="40" y1="934" x2="400" y2="934" stroke="#c9c6be" stroke-width="0.5"/>
<rect x="52" y="943" width="50" height="32" rx="16" fill="#1A1A1A"/>
<text x="77" y="961" text-anchor="middle" class="fs" font-size="9" font-weight="500" fill="#D4E85C" letter-spacing="1.5">HOME</text>
<text x="155" y="961" text-anchor="middle" class="fs" font-size="9" font-weight="500" fill="#999" letter-spacing="1.5">LOG</text>
<text x="235" y="961" text-anchor="middle" class="fs" font-size="9" font-weight="500" fill="#999" letter-spacing="1.5">STATS</text>
<text x="315" y="961" text-anchor="middle" class="fs" font-size="9" font-weight="500" fill="#999" letter-spacing="1.5">DU</text>
