<!-- MILESTONE CARD -->
<!-- ============================================= -->
<text x="40" y="512" class="fs" font-size="10" font-weight="500" fill="#1A1A1A" letter-spacing="3">MEILENSTEIN</text>
<text x="132" y="512" class="fs" font-size="10" font-weight="500" fill="#D4E85C" letter-spacing="1">/</text>
<text x="140" y="512" class="fs" font-size="10" font-weight="500" fill="#999" letter-spacing="3">NÄCHSTES ZIEL</text>

<rect x="40" y="528" width="360" height="96" rx="18" fill="#F4F2EC"/>

<!-- Left content -->
<text x="60" y="552" class="fs" font-size="8" font-weight="500" fill="#999" letter-spacing="2.5">BENCH PRESS 1RM</text>
<text x="60" y="588" class="fs" font-size="32" font-weight="500" fill="#1A1A1A" letter-spacing="-0.04em" font-stretch="condensed">100 kg</text>
<text x="60" y="608" class="fs" font-size="11" font-weight="400" fill="#666">noch <tspan font-weight="500" fill="#1A1A1A">7.5 kg</tspan> · voraussichtlich in <tspan font-weight="500" fill="#1A1A1A">3 Wochen</tspan></text>

<!-- Progress ring right -->
<g transform="translate(328, 576)">
  <circle cx="0" cy="0" r="32" fill="none" stroke="#c9c6be" stroke-width="6"/>
  <!-- 92.5% arc (92.5% of 360 = 333°) -->
  <path d="M 0 -32 A 32 32 0 1 1 -29.8 11.6" fill="none" stroke="#D4E85C" stroke-width="6" stroke-linecap="round"/>
  <text x="0" y="2" text-anchor="middle" class="fs" font-size="16" font-weight="500" fill="#1A1A1A" letter-spacing="-0.04em">92</text>
  <text x="0" y="14" text-anchor="middle" class="fs" font-size="8" font-weight="500" fill="#666" letter-spacing="1.5">% DONE</text>
</g>

<!-- ============================================= -->
<!-- BODY COMPOSITION DELTA -->
<!-- ============================================= -->
<text x="40" y="652" class="fs" font-size="10" font-weight="500" fill="#1A1A1A" letter-spacing="3">KÖRPER</text>
<text x="82" y="652" class="fs" font-size="10" font-weight="500" fill="#D4E85C" letter-spacing="1">/</text>
<text x="90" y="652" class="fs" font-size="10" font-weight="500" fill="#999" letter-spacing="3">SEIT START</text>

<!-- Card 1: Body fat -->
<rect x="40" y="668" width="175" height="96" rx="16" fill="#D4E85C"/>
<text x="56" y="690" class="fs" font-size="8" font-weight="500" fill="#4A5220" letter-spacing="2">KÖRPERFETT</text>
<text x="56" y="724" class="fs" font-size="28" font-weight="500" fill="#1A1A1A" letter-spacing="-0.04em" font-stretch="condensed">− 2.4 %</text>
<text x="56" y="740" class="fs" font-size="9" font-weight="400" fill="#4A5220">18.2 → 15.8 %</text>
<!-- Mini trend -->
<polyline points="56,752 70,750 84,748 98,747 112,745 126,744 140,742 154,740 168,740 182,739 196,738"
          fill="none" stroke="#1A1A1A" stroke-width="1.5"/>

<!-- Card 2: Muscle mass -->
<rect x="225" y="668" width="175" height="96" rx="16" fill="#F4F2EC"/>
<text x="241" y="690" class="fs" font-size="8" font-weight="500" fill="#999" letter-spacing="2">MUSKELMASSE</text>
<text x="241" y="724" class="fs" font-size="28" font-weight="500" fill="#1A1A1A" letter-spacing="-0.04em" font-stretch="condensed">+ 3.1 kg</text>
<text x="241" y="740" class="fs" font-size="9" font-weight="400" fill="#666">68.4 → 71.5 kg</text>
<polyline points="241,752 255,750 269,746 283,744 297,740 311,735 325,730 339,726 353,722 367,719 381,717"
          fill="none" stroke="#D4E85C" stroke-width="1.5"/>

<!-- ============================================= -->
<!-- QUICK-START WORKOUT (Sticky feel) -->
<!-- ============================================= -->
<rect x="40" y="784" width="360" height="100" rx="22" fill="#1A1A1A"/>
<!-- Left content -->
<text x="60" y="808" class="fs" font-size="9" font-weight="500" fill="#D4E85C" letter-spacing="3">HEUTE</text>
<text x="96" y="808" class="fs" font-size="9" font-weight="500" fill="#666" letter-spacing="1">/</text>
<text x="104" y="808" class="fs" font-size="9" font-weight="500" fill="#999" letter-spacing="3">PUSH · 45 MIN</text>
<text x="60" y="840" class="fs" font-size="22" font-weight="500" fill="#F4F2EC" letter-spacing="-0.03em" font-stretch="condensed">PUSH DAY</text>
<text x="60" y="862" class="fs" font-size="11" font-weight="400" fill="#999">Bench · Incline · Dips · Triceps · +1</text>

<!-- START button -->
